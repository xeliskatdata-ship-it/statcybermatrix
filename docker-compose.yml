version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL — Base de données CyberPulse
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: cyberpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cyberpulse_net

  # Airflow  → Sprint 5
  # Streamlit → lancé localement pour l'instant, Dockerfile en Sprint 4

volumes:
  postgres_data:

networks:
  cyberpulse_net:
    driver: bridge