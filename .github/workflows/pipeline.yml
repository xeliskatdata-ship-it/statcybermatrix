name: StatCyberMatrix Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les heures
  workflow_dispatch:       # Lancement manuel possible

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary
          python -m spacy download en_core_web_sm || true
          python -m spacy download fr_core_news_sm || true

      - name: Run acquisition
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          ABUSECH_AUTH_KEY: ${{ secrets.ABUSECH_AUTH_KEY }}
        run: python src/acquisition.py

      - name: Run cleaning
        run: python src/cleaning.py

      - name: Load to Neon
        env:
          POSTGRES_USER: ${{ secrets.NEON_USER }}
          POSTGRES_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          POSTGRES_DB: ${{ secrets.NEON_DBNAME }}
          POSTGRES_HOST: ${{ secrets.NEON_HOST }}
          POSTGRES_PORT: "5432"
        run: python db/load_to_db.py

      - name: Refresh marts on Neon
        env:
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
        run: python .github/scripts/refresh_marts.py